<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Lokasi & Koordinat Modern</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f7fa;
            color: #2d3748;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Card Wrapper Styling */
        .glass-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(160, 174, 192, 0.15);
            border: 1px solid rgba(226, 232, 240, 0.8);
            overflow: hidden;
        }

        /* Map Container - Memastikan tajam dan penuh */
        #map {
            height: 68vh;
            width: 100%;
            cursor: crosshair;
            z-index: 1;
            border-radius: 12px;
        }

        /* Form Controls Styling */
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.15);
            border-color: #3182ce;
        }

        /* Button Customizations */
        .btn {
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary { background-color: #3182ce; border: none; }
        .btn-primary:hover { background-color: #2b6cb0; transform: translateY(-1px); }
        
        .btn-warning { background-color: #ed8936; color: white; border: none; }
        .btn-warning:hover { background-color: #dd6b20; color: white; transform: translateY(-1px); }

        .btn-success { background-color: #38a169; border: none; }
        .btn-success:hover { background-color: #2f855a; transform: translateY(-1px); }

        .btn-secondary { background-color: #718096; border: none; }
        .btn-secondary:hover { background-color: #4a5568; transform: translateY(-1px); }

        /* Coordinate Display Box */
        .coord-display {
            background-color: #edf2f7;
            border-left: 5px solid #3182ce;
            border-radius: 8px;
            padding: 15px;
        }

        .coord-badge {
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 15px;
            color: #2b6cb0;
            border: 1px solid #e2e8f0;
        }

        /* Title Area */
        .app-header {
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(49, 130, 206, 0.2);
        }
    </style>
</head>

<body class="py-4">

<div class="container-fluid main-container">
    
    <div class="app-header text-center">
        <h1 class="fw-bold m-0" style="letter-spacing: -0.5px;">🗺️ GeoFinder Pro</h1>
        <p class="lead fs-6 text-white-50 mt-2 mb-0">Cari lokasi, dapatkan koordinat presisi dengan peta Satelit & Medan terbaru</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="glass-card p-4 h-100 d-flex flex-column justify-content-between">
                <div>
                    <h5 class="fw-bold mb-3 text-secondary">Panel Kontrol</h5>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Cari Nama Tempat / Alamat</label>
                        <input type="text" id="search" class="form-control" placeholder="Contoh: Monas, Labuan Bajo..." onkeypress="if(event.key === 'Enter') searchLocation()">
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-primary" onclick="searchLocation()">🔍 Cari Lokasi</button>
                        <button class="btn btn-warning" onclick="getMyLocation()">📡 Gunakan Lokasi Saya</button>
                    </div>

                    <hr class="text-muted opacity-25">

                    <h5 class="fw-bold my-3 text-secondary">Pengaturan Peta</h5>
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <span class="small fw-semibold text-muted">Navigasi Geser (Drag Peta)</span>
                        <button id="toggle-drag" class="btn btn-secondary btn-sm px-3">🖱️ Geser OFF</button>
                    </div>
                </div>

                <div>
                    <div class="coord-display mb-3">
                        <div class="row text-center">
                            <div class="col-6 border-end border-2">
                                <div class="small fw-bold text-muted mb-1">LATITUDE</div>
                                <span id="lat" class="coord-badge d-block">-</span>
                            </div>
                            <div class="col-6">
                                <div class="small fw-bold text-muted mb-1">LONGITUDE</div>
                                <span id="lng" class="coord-badge d-block">-</span>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-success w-100 py-3" onclick="copyCoord()">
                        📋 Salin Koordinat (Copy)
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="glass-card p-2 h-100">
                <div id="map"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // --- PILIHAN LAYER PETA BARU (LEBIH JELAS & LENGKAP) ---
    
    // 1. Peta Standar Jalan (OpenStreetMap)
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
    });

    // 2. Peta Satelit Presisi Tinggi (Google Hybrid - Ada nama jalan/tempat)
    var googleSatellite = L.tileLayer('https://mt1.googlecom/vt/lyrs=y&x={x}&y={y}&z={z}', {
        attribution: '&copy; Google Maps Satellite',
        maxZoom: 20
    });

    // 3. Peta Medan / Kontur Hibrida (Google Terrain)
    var googleTerrain = L.tileLayer('https://mt1.googlecom/vt/lyrs=p&x={x}&y={y}&z={z}', {
        attribution: '&copy; Google Maps Terrain',
        maxZoom: 20
    });

    // 4. Peta Topografi Alternatif (OpenTopoMap)
    var openTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenTopoMap contributors',
        maxZoom: 17
    });

    // Inisialisasi Peta - Langsung menggunakan Google Satelit sebagai default agar objek terlihat jelas
    var map = L.map('map', {
        center: [-7.0012, 113.8445],
        zoom: 16, // Zoom dinaikkan sedikit agar langsung fokus jelas ke lokasi cluster
        dragging: false,
        layers: [googleSatellite] // Default langsung menggunakan satelit hibrida
    });

        "⛰️ Peta Medan / Kontur": googleTerrain,

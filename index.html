```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pencarian Lokasi & Koordinat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    background:#f8f9fa;
}

#map{
    height:70vh;
    width:100%;
    cursor:crosshair;
}

.coord-box{
    font-size:16px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container py-4">

<h2 class="text-center mb-4">
🗺️ Pencarian Lokasi & Koordinat
</h2>

<div class="row g-2 mb-3">

<div class="col-md-6">
<input
type="text"
id="search"
class="form-control"
placeholder="Contoh: Jakarta, Gunung Bromo, Monas...">
</div>

<div class="col-md-2">
<button
class="btn btn-primary w-100"
onclick="searchLocation()">
Cari Lokasi
</button>
</div>

<div class="col-md-2">
<button
class="btn btn-warning w-100"
onclick="getMyLocation()">
📡 Lokasi Saya
</button>
</div>

<div class="col-md-2">
<button
id="toggle-drag"
class="btn btn-secondary w-100">
🖱️ Geser OFF
</button>
</div>

</div>

<div id="map" class="rounded shadow"></div>

<div class="alert alert-info mt-3 coord-box">
Latitude:
<span id="lat">-</span>

|

Longitude:
<span id="lng">-</span>
</div>

<div class="d-grid gap-2">
<button
class="btn btn-success"
onclick="copyCoord()">
📋 Copy Koordinat
</button>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map',{
center:[-2.5489,118.0149],
zoom:5,
dragging:false
});

var osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'&copy; OpenStreetMap contributors'
}
);

var satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'Esri Satellite'
}
);

osm.addTo(map);

L.control.layers(
{
"Peta Biasa":osm,
"Satelit":satellite
}
).addTo(map);

let marker=null;
let isDragging=false;
let lastCoord="";

document
.getElementById('toggle-drag')
.addEventListener('click',function(){

isDragging=!isDragging;

if(isDragging){

map.dragging.enable();

this.textContent="🖱️ Geser ON";

this.classList.remove('btn-secondary');
this.classList.add('btn-success');

}else{

map.dragging.disable();

this.textContent="🖱️ Geser OFF";

this.classList.remove('btn-success');
this.classList.add('btn-secondary');
}
});

map.on('click',function(e){

const lat=e.latlng.lat.toFixed(6);
const lng=e.latlng.lng.toFixed(6);

document.getElementById('lat').innerText=lat;
document.getElementById('lng').innerText=lng;

lastCoord=lat+', '+lng;

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lng])
.addTo(map)
.bindPopup(
`Koordinat:<br><b>${lat}, ${lng}</b>`
)
.openPopup();

});

function copyCoord(){

if(lastCoord===""){
alert("Belum ada koordinat dipilih");
return;
}

navigator.clipboard.writeText(lastCoord);

alert("Koordinat berhasil disalin");
}

function getMyLocation(){

if(!navigator.geolocation){
alert("GPS tidak didukung browser");
return;
}

navigator.geolocation.getCurrentPosition(

function(pos){

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

map.setView([lat,lng],16);

document.getElementById('lat').innerText=
lat.toFixed(6);

document.getElementById('lng').innerText=
lng.toFixed(6);

lastCoord=
lat.toFixed(6)+", "+
lng.toFixed(6);

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lng])
.addTo(map)
.bindPopup("📡 Lokasi Saya")
.openPopup();

},

function(){
alert("GPS tidak diizinkan");
}

);
}

function searchLocation(){

const query=
document.getElementById('search').value;

if(!query){

alert("Silakan masukkan lokasi");

return;
}

fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`
)

.then(res=>res.json())

.then(data=>{

if(data.length>0){

const lat=parseFloat(data[0].lat);
const lon=parseFloat(data[0].lon);

map.setView([lat,lon],15);

document.getElementById('lat').innerText=
lat.toFixed(6);

document.getElementById('lng').innerText=
lon.toFixed(6);

lastCoord=
lat.toFixed(6)+", "+
lon.toFixed(6);

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lon])
.addTo(map)
.bindPopup(
`<b>${query}</b><br>
${lat}, ${lon}`
)
.openPopup();

}else{

alert("Lokasi tidak ditemukan");
}

})

.catch(err=>{

console.error(err);

alert("Terjadi kesalahan");
});
}

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Lokasi & Koordinat Modern</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f7fa;
            color: #2d3748;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Card Wrapper Styling */
        .glass-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(160, 174, 192, 0.15);
            border: 1px solid rgba(226, 232, 240, 0.8);
            overflow: hidden;
        }

        /* Map Container */
        #map {
            height: 65vh;
            width: 100%;
            cursor: crosshair;
            z-index: 1;
        }

        /* Form Controls Styling */
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.15);
            border-color: #3182ce;
        }

        /* Button Customizations */
        .btn {
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary { background-color: #3182ce; border: none; }
        .btn-primary:hover { background-color: #2b6cb0; transform: translateY(-1px); }
        
        .btn-warning { background-color: #ed8936; color: white; border: none; }
        .btn-warning:hover { background-color: #dd6b20; color: white; transform: translateY(-1px); }

        .btn-success { background-color: #38a169; border: none; }
        .btn-success:hover { background-color: #2f855a; transform: translateY(-1px); }

        .btn-secondary { background-color: #718096; border: none; }
        .btn-secondary:hover { background-color: #4a5568; transform: translateY(-1px); }

        /* Coordinate Display Box */
        .coord-display {
            background-color: #edf2f7;
            border-left: 5px solid #3182ce;
            border-radius: 8px;
            padding: 15px;
        }

        .coord-badge {
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 15px;
            color: #2b6cb0;
            border: 1px solid #e2e8f0;
        }

        /* Title Area */
        .app-header {
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(49, 130, 206, 0.2);
        }
    </style>
</head>

<body class="py-4">

<div class="container-fluid main-container">
    
    <div class="app-header text-center">
        <h1 class="fw-bold m-0" style="letter-spacing: -0.5px;">🗺️ GeoFinder Pro</h1>
        <p class="lead fs-6 text-white-50 mt-2 mb-0">Cari lokasi, dapatkan koordinat presisi, dan salin dengan satu klik</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="glass-card p-4 h-100 d-flex flex-column justify-content-between">
                <div>
                    <h5 class="fw-bold mb-3 text-secondary">Panel Kontrol</h5>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Cari Nama Tempat / Alamat</label>
                        <input type="text" id="search" class="form-control" placeholder="Contoh: Monas, Labuan Bajo...">
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-primary" onclick="searchLocation()">🔍 Cari Lokasi</button>
                        <button class="btn btn-warning" onclick="getMyLocation()">📡 Gunakan Lokasi Saya</button>
                    </div>

                    <hr class="text-muted opacity-25">

                    <h5 class="fw-bold my-3 text-secondary">Pengaturan Peta</h5>
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <span class="small fw-semibold text-muted">Navigasi Geser (Drag Peta)</span>
                        <button id="toggle-drag" class="btn btn-secondary btn-sm px-3">🖱️ Geser OFF</button>
                    </div>
                </div>

                <div>
                    <div class="coord-display mb-3">
                        <div class="row text-center">
                            <div class="col-6 border-end border-2">
                                <div class="small fw-bold text-muted mb-1">LATITUDE</div>
                                <span id="lat" class="coord-badge d-block">-</span>
                            </div>
                            <div class="col-6">
                                <div class="small fw-bold text-muted mb-1">LONGITUDE</div>
                                <span id="lng" class="coord-badge d-block">-</span>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-success w-100 py-3" onclick="copyCoord()">
                        📋 Salin Koordinat (Copy)
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="glass-card p-2 h-100">
                <div id="map" class="rounded-3"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Inisialisasi Peta - Difokuskan langsung ke area kluster Lalangon / Manding
    var map = L.map('map', {
        center: [-7.0012, 113.8445],
        zoom: 15,
        dragging: false
    });

    // Layer Peta Standard
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    });

    // Layer Peta Satelit
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri Satellite'
    });

    osm.addTo(map);

    // Kontrol Peta Pojok Kanan Atas
    L.control.layers({
        "Peta Standar": osm,
        "Satelit Bumi": satellite
    }).addTo(map);

    let marker = null;
    let isDragging = false;
    let lastCoord = "";

    // --- DATA PIN LOKASI PABRIK TAHU ---
    const dataPabrikTahu = [
        {
            nama: "Pabrik Tahu H. Ali",
            alamat: "Dusun Ganjur, Lalangon",
            lat: -7.002150,
            lng: 113.843200
        },
        {
            nama: "Pabrik Tahu Amsariyono",
            alamat: "Dusun Ganjur, Lalangon",
            lat: -7.001800,
            lng: 113.845100
        },
        {
            nama: "Hj. Ami Pabrik Tahu Dan Agen Kedelai Tahu",
            alamat: "Ganjur, Lalangon",
            lat: -7.000950,
            lng: 113.842900
        },
        {
            nama: "Pabrik Tahu 4 Saudara (PAK TALLEP)",
            alamat: "Jalan Raya Manding, Ganjur, Lalangon",
            lat: -6.999500,
            lng: 113.844200
        },
        {
            nama: "Tahu Nikmat H. Rahmat",
            alamat: "Lalangon Area",
            lat: -7.003100,
            lng: 113.846500
        }
    ];

    // Sematkan marker ke peta menggunakan perulangan Array
    dataPabrikTahu.forEach(function(item) {
        L.marker([item.lat, item.lng])
            .addTo(map)
            .bindPopup(`<b>🏭 ${item.nama}</b><br><small class="text-muted">${item.alamat}</small><br><span style="color:#2b6cb0; font-family:monospace;">${item.lat}, ${item.lng}</span>`);
    });
    // ------------------------------------

    // Fitur Toggle Aktifkan Geser Peta
    document.getElementById('toggle-drag').addEventListener('click', function() {
        isDragging = !isDragging;
        if (isDragging) {
            map.dragging.enable();
            this.textContent = "🖱️ Geser ON";
            this.classList.remove('btn-secondary');
            this.classList.add('btn-success');
        } else {
            map.dragging.disable();
            this.textContent = "🖱️ Geser OFF";
            this.classList.remove('btn-success');
            this.classList.add('btn-secondary');
        }
    });

    // Klik Pada Peta untuk mengambil koordinat manual
    map.on('click', function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        document.getElementById('lat').innerText = lat;
        document.getElementById('lng').innerText = lng;
        lastCoord = lat + ', ' + lng;

        if (marker) {
            map.removeLayer(marker);
        }

        marker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup(`<b>Titik Terpilih</b><br>Koordinat: ${lat}, ${lng}`)
            .openPopup();
    });

    // Fungsi Copy ke Clipboard
    function copyCoord() {
        if (lastCoord === "") {
            alert("Silakan pilih lokasi di peta terlebih dahulu.");
            return;
        }
        navigator.clipboard.writeText(lastCoord);
        alert("Koordinat disalin: " + lastCoord);
    }

    // Geolocation API (Deteksi Lokasi Pengguna)
    function getMyLocation() {
        if (!navigator.geolocation) {
            alert("Browser Anda tidak mendukung fitur deteksi GPS.");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                map.setView([lat, lng], 16);
                document.getElementById('lat').innerText = lat.toFixed(6);
                document.getElementById('lng').innerText = lng.toFixed(6);
                lastCoord = lat.toFixed(6) + ", " + lng.toFixed(6);

                if (marker) {
                    map.removeLayer(marker);
                }

                marker = L.marker([lat, lng])
                    .addTo(map)
                    .bindPopup("📡 <b>Lokasi Anda Sekarang</b>")
                    .openPopup();
            },
            function() {
                alert("Izin akses lokasi/GPS ditolak oleh pengguna atau diblokir browser.");
            }
        );
    }

    // Fitur Search Lokasi Menggunakan OpenStreetMap Nominatim
    function searchLocation() {
        const query = document.getElementById('search').value;
        if (!query) {
            alert("Masukkan nama tempat yang ingin dicari!");
            return;
        }

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);

                    map.setView([lat, lon], 15);
                    document.getElementById('lat').innerText = lat.toFixed(6);
                    document.getElementById('lng').innerText = lon.toFixed(6);
                    lastCoord = lat.toFixed(6) + ", " + lon.toFixed(6);

                    if (marker) {
                        map.removeLayer(marker);
                    }

                    marker = L.marker([lat, lon])
                        .addTo(map)
                        .bindPopup(`<b>Hasil Pencarian:</b><br>${query}<br><span style="color:#2b6cb0;">${lat.toFixed(6)}, ${lon.toFixed(6)}</span>`)
                        .openPopup();
                } else {
                    alert("Lokasi tidak dapat ditemukan. Coba kata kunci lain.");
                }
            })
            .catch(err => {
                console.error(err);
                alert("Gagal memuat data lokasi. Periksa koneksi internet Anda.");
            });
    }
</script>

</body>
</html>

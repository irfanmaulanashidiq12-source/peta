<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =========================
// LAYER PETA
// =========================

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
});

var googleSatellite = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
    {
        attribution: '&copy; Google Satellite',
        maxZoom: 20
    }
);

// =========================
// TITIK TENGAH PETA
// =========================

var lalangonCenter = [-6.978500, 113.858000];

var map = L.map('map', {
    center: lalangonCenter,
    zoom: 17,
    dragging: false,
    layers: [osm]
});

var baseMaps = {
    "🗺️ OpenStreetMap": osm,
    "🛰️ Google Satellite": googleSatellite
};

L.control.layers(baseMaps).addTo(map);

// =========================
// MARKER UTAMA
// =========================

var mainMarker = L.marker(
    lalangonCenter,
    {
        draggable: true
    }
).addTo(map);

updateCoords(
    lalangonCenter[0],
    lalangonCenter[1]
);

function updateCoords(lat, lng) {

    document.getElementById('lat').innerText =
        lat.toFixed(6);

    document.getElementById('lng').innerText =
        lng.toFixed(6);
}

mainMarker.on('dragend', function () {

    var pos = mainMarker.getLatLng();

    updateCoords(
        pos.lat,
        pos.lng
    );
});

map.on('click', function (e) {

    mainMarker.setLatLng(
        e.latlng
    );

    updateCoords(
        e.latlng.lat,
        e.latlng.lng
    );
});

// =========================
// DATA PABRIK TAHU
// =========================

var pabrikTahuData = [

    {
        nama: "🏭 Pabrik Tahu H. Ali",
        alamat: "Dusun Ganjur, Lalangon",
        coords: [-6.977568, 113.8590036]
    },

    {
        nama: "🏭 Hj. Ami Pabrik Tahu Dan Agen Kedelai Tahu",
        alamat: "Dusun Ganjur, Lalangon",
        coords: [-6.980416, 113.8581295]
    },

    {
        nama: "🏭 Pabrik Tahu 4 Saudara (PAK TALLEP)",
        alamat: "Jl. Raya Manding, Ganjur",
        coords: [-6.975710, 113.8571103]
    },

    {
        nama: "🏭 Tahu Nikmat H. Rahmat",
        alamat: "Jl. Raya Manding, Ganjur",
        coords: [-6.9791129, 113.8582466]
    }

];

// =========================
// TAMPILKAN MARKER PABRIK
// =========================

var bounds = [];

pabrikTahuData.forEach(function (pabrik) {

    bounds.push(
        pabrik.coords
    );

    var marker = L.marker(
        pabrik.coords
    ).addTo(map);

    marker.bindPopup(`

        <div style="min-width:230px">

            <h6 style="font-weight:bold;color:#3182ce;">
                ${pabrik.nama}
            </h6>

            <p style="margin-bottom:8px;">
                📍 ${pabrik.alamat}
            </p>

            <small>
                Lat : ${pabrik.coords[0]}
                <br>
                Lng : ${pabrik.coords[1]}
            </small>

            <br><br>

            <button
                onclick="selectPabrik(${pabrik.coords[0]},${pabrik.coords[1]})"
                style="
                    width:100%;
                    padding:8px;
                    border:none;
                    border-radius:8px;
                    background:#3182ce;
                    color:white;
                    font-weight:bold;
                    cursor:pointer;
                ">

                🎯 Pilih Titik Ini

            </button>

        </div>

    `);

});

// Zoom otomatis ke semua titik

map.fitBounds(
    bounds,
    {
        padding: [50, 50]
    }
);

// =========================
// PILIH TITIK
// =========================

window.selectPabrik = function(lat,lng){

    mainMarker.setLatLng([
        lat,
        lng
    ]);

    updateCoords(
        lat,
        lng
    );

    map.setView(
        [lat,lng],
        18
    );
};

// =========================
// PENCARIAN LOKASI
// =========================

function searchLocation() {

    var query =
        document.getElementById('search').value;

    if (!query) {
        alert('Masukkan nama lokasi');
        return;
    }

    fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`
    )

    .then(res => res.json())

    .then(data => {

        if(data.length > 0){

            var lat =
                parseFloat(data[0].lat);

            var lon =
                parseFloat(data[0].lon);

            map.setView(
                [lat,lon],
                17
            );

            mainMarker.setLatLng(
                [lat,lon]
            );

            updateCoords(
                lat,
                lon
            );

        } else {

            alert('Lokasi tidak ditemukan');

        }

    });
}

// =========================
// GPS SAYA
// =========================

function getMyLocation(){

    if(!navigator.geolocation){

        alert('GPS tidak didukung');

        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            var lat =
                position.coords.latitude;

            var lng =
                position.coords.longitude;

            map.setView(
                [lat,lng],
                17
            );

            mainMarker.setLatLng(
                [lat,lng]
            );

            updateCoords(
                lat,
                lng
            );
        }

    );
}

// =========================
// TOGGLE DRAG
// =========================

var dragButton =
    document.getElementById('toggle-drag');

dragButton.addEventListener(
    'click',
    function(){

        if(map.dragging.enabled()){

            map.dragging.disable();

            dragButton.innerText =
                '🖱️ Geser OFF';

            dragButton.classList.remove(
                'btn-success'
            );

            dragButton.classList.add(
                'btn-secondary'
            );

        } else {

            map.dragging.enable();

            dragButton.innerText =
                '🖱️ Geser ON';

            dragButton.classList.remove(
                'btn-secondary'
            );

            dragButton.classList.add(
                'btn-success'
            );
        }
    }
);

// =========================
// COPY KOORDINAT
// =========================

function copyCoord(){

    var lat =
        document.getElementById('lat').innerText;

    var lng =
        document.getElementById('lng').innerText;

    var text =
        lat + ", " + lng;

    navigator.clipboard.writeText(text)
        .then(() => {

            alert(
                "Koordinat disalin:\n" + text
            );

        });
}

</script>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pencarian Lokasi & Koordinat - Leaflet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 500px; width: 100%; cursor: crosshair; }
  </style>
</head>
<body>
  <div class="container py-4">
    <h2 class="text-center mb-4">🗺️ Pencarian Lokasi & Koordinat</h2>

    <!-- Search bar -->
    <div class="row mb-3">
      <div class="col-md-8">
        <input type="text" id="search" class="form-control" placeholder="Contoh: Jakarta, Gunung Bromo, Monas...">
      </div>
      <div class="col-md-4 d-flex gap-2">
        <button class="btn btn-primary w-100" onclick="searchLocation()">Cari Lokasi</button>
        <button id="toggle-drag" class="btn btn-secondary w-100">🖱️ Geser Peta: OFF</button>
      </div>
    </div>

    <!-- Map container -->
    <div id="map" class="rounded shadow"></div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Inisialisasi peta
    var map = L.map('map', {
      center: [-2.5489, 118.0149], // Tengah Indonesia
      zoom: 5,
      dragging: false // Awalnya tidak bisa digeser
    });

    // Tambahkan tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;
    let isDragging = false;

    // Toggle tombol untuk mengaktifkan/menonaktifkan dragging
    document.getElementById('toggle-drag').addEventListener('click', function () {
      isDragging = !isDragging;
      if (isDragging) {
        map.dragging.enable();
        this.textContent = "🖱️ Geser Peta: ON";
        this.classList.remove('btn-secondary');
        this.classList.add('btn-success');
      } else {
        map.dragging.disable();
        this.textContent = "🖱️ Geser Peta: OFF";
        this.classList.remove('btn-success');
        this.classList.add('btn-secondary');
      }
    });

    // Klik peta → tampilkan koordinat
    map.on('click', function(e) {
      const lat = e.latlng.lat.toFixed(6);
      const lng = e.latlng.lng.toFixed(6);

      if (marker) {
        map.removeLayer(marker);
      }

      marker = L.marker([lat, lng]).addTo(map)
        .bindPopup(`Koordinat:<br><strong>${lat}, ${lng}</strong>`)
        .openPopup();
    });

    // Fungsi pencarian lokasi
    function searchLocation() {
      const query = document.getElementById('search').value;
      if (!query) {
        alert("Silakan masukkan nama lokasi.");
        return;
      }

      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(data => {
          if (data.length > 0) {
            const lat = parseFloat(data[0].lat);
            const lon = parseFloat(data[0].lon);
            map.setView([lat, lon], 13);

            if (marker) {
              map.removeLayer(marker);
            }

            marker = L.marker([lat, lon]).addTo(map)
              .bindPopup(`<strong>${query}</strong><br>Koordinat: ${lat}, ${lon}`)
              .openPopup();
          } else {
            alert("Lokasi tidak ditemukan.");
          }
        })
        .catch(err => {
          console.error("Gagal fetch lokasi:", err);
          alert("Terjadi kesalahan saat mencari lokasi.");
        });
    }
  </script>
</body>
</html>
